<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <title>小云翰驱动教育培训机构增长的数据系统</title>
  <style>
    body {
      SCROLLBAR-FACE-COLOR:#ff0198;   /* 滚动条凸出部分的颜色*/ 
      SCROLLBAR-HIGHLIGHT-COLOR:#ff0198;/*滚动条空白部分的颜色 */
      SCROLLBAR-SHADOW-COLOR:#ff0000;/*立体滚动条阴影的颜色 */
      SCROLLBAR-3DLIGHT-COLOR:#ff0198;/*滚动条亮边的颜色 */
      SCROLLBAR-ARROW-COLOR:#ffffff;/*上下按钮上三角箭头的颜色*/ 
      SCROLLBAR-TRACK-COLOR:#ffffff;/*滚动条的背景颜色 */
      SCROLLBAR-BASE-COLOR:#ff0198/*滚动条的基本颜色 */
    }
    .recommend {
      z-index: 1000;
      position: fixed;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
    }

    .recommend .recommend-content {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      height: 300px;
      width: 500px;
      padding: 50px;
      margin: auto;
      box-sizing: border-box;
      border-radius: 25px;
      background: #fff;
      border: 1px solid #ccc;

    }

    .recommend .recommend-content .close-btn {
      cursor: pointer;
      position: absolute;
      right: 10px;
      top: 0;
      width: 50px;
      height: 50px;
      font-size: 36px;
      color: #eee;
      background: none;
      border: none;
    }

    .recommend .recommend-content .close-btn:hover {
      color: #999;
    }

    .recommend .recommend-content p {
      font-size: 20px;
      margin-top: 40px;
      margin-bottom: 60px;
    }

    .recommend .recommend-content .btns-bar a {
      display: inline-block;
      padding: 10px 20px;
      border: 1px solid #ccc;
      line-height: 1.5;
      color: #57caff;
      text-decoration: none;
    }

    .recommend .recommend-content .btns-bar a:hover {
      opacity: 0.8;
    }

    .recommend .recommend-content .btns-bar a:last-child {
      margin-left: 120px;
    }
  </style>
  <script> function loadErr(str) {
    let tag;
    if (str === 'font-awesome') {
      tag = document.createElement("link");
      tag.rel = 'stylesheet'
      tag.href = "https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css";
    }
    if (str === 'echarts') {
      tag = document.createElement("script");
      tag.src = 'https://cdn.jsdelivr.net/npm/echarts@4.1.0/dist/echarts.min.js';
    }
    document.head.appendChild(tag);
  }</script>
  <link onerror="loadErr('font-awesome')" href="https://cdn.bootcss.com/font-awesome/5.13.0/css/all.css" rel="stylesheet">
  <script onerror="loadErr('echarts')" src="https://lib.baomitu.com/echarts/4.1.0/echarts-en.common.js"></script></head>

  <!-- <link onerror="loadErr('font-awesome')" href="//netdna.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    rel="stylesheet">
  <script onerror="loadErr('echarts')" src="https://cdn.bootcdn.net/ajax/libs/echarts/5.0.0-alpha.1/echarts.common.js">
  </script>
  </head> -->

  <body>
    <div class='recommend' id='recommend' style='display: none'>
      <div class='recommend-content' id='recommend-content'>
      <button class='close-btn' id='recommend-close'>X</button>
      <p>推荐使用Chrome，360等浏览器访问网站。</p>
    <div class='btns-bar'>
      <a href=" https://pc.qq.com/detail/1/detail_2661.html ">Chrome浏览器</a>
      <a href="https://browser.360.cn/se/ ">360浏览器</a>
    </div>
    </div>
    </div>
    <div id="app"></div>
      <!-- built files will be auto injected -->
    <script>
        (function () {
          function versions() {
            var u = navigator.userAgent;
            var app = navigator.appVersion;
            return {         //移动终端浏览器版本信息
              trident: u.indexOf('Trident') > -1, //IE内核
              presto: u.indexOf('Presto') > -1, //opera内核
              webKit: u.indexOf('AppleWebKit') > -1, //苹果、谷歌内核
              gecko: u.indexOf('Gecko') > -1 && u.indexOf('KHTML') == -1, //火狐内核
              mobile: !!u.match(/AppleWebKit.*Mobile.*/), //是否为移动终端
              ios: !!u.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/), //ios终端
              android: u.indexOf('Android') > -1 || u.indexOf('Linux') > -1, //android终端或uc浏览器
              iPhone: u.indexOf('iPhone') > -1, //是否为iPhone或者QQHD浏览器
              iPad: u.indexOf('iPad') > -1, //是否iPad
              webApp: u.indexOf('Safari') == -1 //是否web应该程序，没有头部与底部
            };
          }
          function addEvent(element, eType, handle, bol) {
            if (element.addEventListener) {           //如果支持addEventListener
              element.addEventListener(eType, handle, bol);
            } else if (element.attachEvent) {          //如果支持attachEvent
              element.attachEvent("on" + eType, handle);
            } else {                                  //否则使用兼容的onclick绑定
              element["on" + eType] = handle;
            }
          }
          function close() {
            var wrap = document.getElementById("recommend");
            wrap.style.display = "none";
          }
          function close2(e) {
            window.event ? window.event.cancelBubble = true : e.stopPropagation();
          }
          var wrap = document.getElementById("recommend");
          var content = document.getElementById("recommend-content");
          var closeBtn = document.getElementById('recommend-close');
          addEvent(wrap, "click", close, false);
          addEvent(content, "click", close2, false);
          addEvent(closeBtn, "click", close, false);
          var types = versions();
          console.log(types);
          if (!types.mobile) {
            if (types.iPhone || types.trident) {
              wrap.style.display = 'block';
            }
          }
        })();
      </script></body>

</html>
