<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title></title>
    <style>
      .content-wrap{
        /* overflow: hidden; */
        text-align: center;
        padding-top: 10px;
      }
      .label{
        display: inline-block;
        margin-right:20px;
      }
      #videoLink{
        display: inline-block;
        height:28px;
        padding:0 10px;
      }
    </style>
  </head>
  <body>
    <div class="content-wrap"><div class="label">视频地址</div> <input placeholder="请输入视频的通用代码" id="videoLink" /></div>
    <div id="videoLink-error" class="error-tips" style="display:none">请输入正确的通用代码</div>
    <script type="text/javascript" src="../internal.js"></script>
    <script>
      dialog.onok = function() {
        var videoLink = $G('videoLink');
        var errorTips = $G('videoLink-error');
        var value = videoLink.value;
        if(value.search("<iframe") === -1){
          errorTips.style.display='block';
          return;
        }
        var srcReg = /src=[\'\"]?([^\'\"]*)[\'\"]?/i;
        var src = value.match(srcReg)[1];
        var src = '<iframe height=500 width=700 src=' + src + " frameborder=0 'allowfullscreen'></iframe>";
        editor.execCommand("inserthtml",src);
        dialog.close();
      };
    </script>
  </body>
</html>
