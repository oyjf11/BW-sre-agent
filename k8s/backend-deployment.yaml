apiVersion: apps/v1
kind: Deployment
metadata:
  name: opspilot-backend
  namespace: opspilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opspilot-backend
  template:
    metadata:
      labels:
        app: opspilot-backend
    spec:
      containers:
        - name: backend
          image: registry-vpc.cn-shenzhen.aliyuncs.com/hoo-ops/opspilot-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: opspilot-config
            - secretRef:
                name: opspilot-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: opspilot-backend
  namespace: opspilot
spec:
  selector:
    app: opspilot-backend
  ports:
    - port: 8000
      targetPort: 8000
