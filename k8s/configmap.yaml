apiVersion: v1
kind: ConfigMap
metadata:
  name: opspilot-config
  namespace: opspilot
data:
  APP_ENV: "prod"
  DEBUG: "false"
  LLM_PROVIDER: "deepseek"
  LLM_TIMEOUT: "60"
  LLM_MAX_RETRIES: "3"
  HTTP_TIMEOUT: "30"
  SSE_TIMEOUT: "300"
  TOOL_ADAPTER_MODE: "real"
  # 允许前端域名，替换为你的实际前端地址
  CORS_ORIGINS: '["https://ops.yunhan100.com"]'
