# 模板文件，真实值在云效变量组里通过 envsubst 注入，不要提交真实值
# 云效流水线中配置以下变量：
#   DATABASE_URL / DEEPSEEK_API_KEY / MYSQL_HOST / MYSQL_USER / MYSQL_PASSWORD / MYSQL_DB
#   KUBECONFIG_B64（base64 编码的 kubeconfig，用于 K8s 适配器）
apiVersion: v1
kind: Secret
metadata:
  name: opspilot-secret
  namespace: opspilot
type: Opaque
stringData:
  DATABASE_URL: "${DATABASE_URL}"
  DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
  MYSQL_HOST: "${MYSQL_HOST}"
  MYSQL_PORT: "3306"
  MYSQL_USER: "${MYSQL_USER}"
  MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
  MYSQL_DB: "${MYSQL_DB}"
